<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Regent Home Portal</title>
<style>
:root{--bg:#f3f6fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#dbe3ee;--blue:#3b82f6;--blue2:#38bdf8;--nav:#0b1222;--shadow:0 12px 34px rgba(15,23,42,.07);--shadow2:0 24px 80px rgba(15,23,42,.18);--radius:22px}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:radial-gradient(circle at top,#eaf6ff 0,#f3f6fb 42%,#eef3f8 100%);color:var(--ink);font-family:Inter,"Segoe UI",Roboto,Arial,sans-serif;font-size:14px}.page{min-height:100vh;padding:28px clamp(18px,4vw,54px) 44px}.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px}.brand{display:flex;gap:14px;align-items:center}.brandMark{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--blue2),#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 16px 36px rgba(37,99,235,.22)}.brand h1{font-size:30px;line-height:1.05;margin:0;font-weight:650;letter-spacing:-.03em}.brand p{margin:6px 0 0;color:#52627a}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{height:42px;border:1px solid #dbe7f5;background:#fff;border-radius:14px;padding:0 15px;color:#334155;font-weight:650;cursor:pointer;box-shadow:0 8px 22px rgba(15,23,42,.04)}.btn:hover{background:#f8fbff}.btn.primary{border-color:#bfdbfe;background:#eaf4ff;color:#1d4ed8}.btn.dark{border-color:#111827;background:#111827;color:#fff}.btn.danger{border-color:#fecaca;background:#fff1f2;color:#b91c1c}.hero{position:relative;background:linear-gradient(135deg,#fff 0%,#fbfdff 55%,#edf7ff 100%);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;margin-bottom:22px;overflow:hidden}.hero:before{content:"";position:absolute;right:-78px;top:-88px;width:250px;height:250px;border-radius:999px;background:radial-gradient(circle,rgba(56,189,248,.25),rgba(59,130,246,0));pointer-events:none}.heroInner{position:relative;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}.hero h2{font-size:22px;margin:0 0 8px;font-weight:600;letter-spacing:-.02em}.hero p{margin:0;color:#607089;line-height:1.5}.searchWrap{display:flex;gap:10px;min-width:min(520px,45vw)}.input,.select{height:42px;border:1px solid var(--line);border-radius:13px;background:#fff;padding:0 13px;color:#0f172a;outline:0;width:100%}.input:focus,.select:focus,.textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(147,197,253,.28)}
.portalCanvas{position:relative;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:minmax(310px,1fr) minmax(310px,1fr);gap:22px;min-height:690px}.portalCanvas:before,.portalCanvas:after{content:"";position:absolute;background:#ccd7e5;z-index:0}.portalCanvas:before{left:50%;top:24px;bottom:24px;width:1px}.portalCanvas:after{top:50%;left:24px;right:24px;height:1px}.hub{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:96px;height:96px;border-radius:32px;background:linear-gradient(135deg,#0f172a,#1e293b);box-shadow:0 24px 70px rgba(15,23,42,.22);z-index:2;display:flex;align-items:center;justify-content:center;color:#fff;border:8px solid #f3f6fb}.hub svg{width:32px;height:32px;stroke-width:1.7}.moduleCard{position:relative;z-index:1;background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:22px;display:flex;flex-direction:column;overflow:hidden}.moduleCard:after{content:"";position:absolute;width:160px;height:160px;right:-70px;top:-80px;border-radius:999px;background:radial-gradient(circle,rgba(59,130,246,.13),rgba(59,130,246,0));pointer-events:none}.moduleCard:nth-child(2n):after{left:-80px;right:auto;top:auto;bottom:-88px}.moduleTop{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.moduleTitle{display:flex;align-items:center;gap:13px;min-width:0}.moduleIcon{width:48px;height:48px;border-radius:17px;background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 15px 30px rgba(37,99,235,.18);flex:0 0 auto}.moduleIcon svg{width:23px;height:23px;stroke-width:1.8}.moduleTitle h3{margin:0;font-size:24px;font-weight:650;letter-spacing:-.025em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.moduleTitle p{margin:4px 0 0;color:#64748b;font-size:12px}.miniActions{display:flex;gap:8px}.iconBtn{width:35px;height:35px;border:1px solid #e2e8f0;background:#fff;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:#64748b}.iconBtn:hover{background:#f8fbff;color:#0f172a}.linkGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:4px}.portalLink{min-height:74px;text-decoration:none;color:#0f172a;background:#f9fbfe;border:1px solid #e5edf6;border-radius:16px;padding:14px 14px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;transition:.16s ease}.portalLink:hover{transform:translateY(-2px);background:#f4f9ff;border-color:#cfe3fb;box-shadow:0 12px 28px rgba(15,23,42,.07)}.portalLink b{display:block;font-size:14px;font-weight:650;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.portalLink span{display:block;margin-top:5px;color:#64748b;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.goBadge{font-size:12px;color:#1d4ed8;background:#eaf4ff;border:1px solid #bfdbfe;border-radius:999px;padding:6px 9px}.empty{border:1px dashed #cbd5e1;border-radius:17px;background:rgba(248,251,255,.75);padding:17px;color:#64748b;line-height:1.5}.addSmall{margin-top:auto;padding-top:16px}.portalView{display:none;position:fixed;inset:0;z-index:40;background:var(--bg)}.portalView.active{display:block}.portalBar{height:62px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 10px 28px rgba(15,23,42,.05);padding:0 18px 0 22px}.portalTitle{min-width:0}.portalTitle b{display:block;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.portalTitle span{display:block;color:#64748b;font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.frameWrap{height:calc(100vh - 62px);position:relative}.frame{width:100%;height:100%;border:0;background:#fff}.floatingHome{position:fixed;right:22px;bottom:22px;z-index:60;width:58px;height:58px;border:0;border-radius:20px;background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff;box-shadow:0 18px 45px rgba(37,99,235,.30);display:none;align-items:center;justify-content:center;cursor:pointer}.portalView.active .floatingHome{display:flex}.modalBack{position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;align-items:center;justify-content:center;z-index:80;padding:20px}.modalBack.active{display:flex}.modal{width:min(720px,100%);background:#fff;border-radius:20px;box-shadow:var(--shadow2);border:1px solid #e2e8f0;overflow:hidden}.modalHead{padding:20px 22px;border-bottom:1px solid #edf2f8;display:flex;justify-content:space-between;align-items:center}.modalHead h3{margin:0;font-size:20px;font-weight:650}.modalBody{padding:20px 22px;display:grid;gap:14px}.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:grid;gap:7px}.field label{font-weight:650;color:#334155;font-size:12px}.field.full{grid-column:1/-1}.modalFoot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px 22px}.textarea{min-height:130px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px 13px;color:#0f172a;outline:0;resize:vertical;font-family:inherit}.hide{display:none!important}@media(max-width:1050px){.portalCanvas{grid-template-columns:1fr;grid-template-rows:auto;min-height:0}.portalCanvas:before,.portalCanvas:after,.hub{display:none}.linkGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.heroInner{grid-template-columns:1fr}.searchWrap{min-width:0}}@media(max-width:650px){.page{padding:20px 16px 34px}.topbar{display:block}.actions{justify-content:flex-start;margin-top:14px}.brand h1{font-size:26px}.moduleTitle h3{font-size:20px}.linkGrid,.formGrid{grid-template-columns:1fr}.portalBar{height:auto;min-height:68px;align-items:flex-start;padding:14px}.frameWrap{height:calc(100vh - 76px)}}

/* v3: cleaner link-tree style without the centre Home hub */
.hero{padding:18px 22px}.heroTag{display:none}.portalCanvas{gap:26px;min-height:660px}.portalCanvas:before,.portalCanvas:after{background:linear-gradient(90deg,transparent,#c9d7e8,transparent);opacity:.75}.portalCanvas:before{width:2px;background:linear-gradient(180deg,transparent,#c9d7e8,transparent)}.portalCanvas:after{height:2px}.hub{display:none!important}.moduleCard{border-radius:28px;padding:24px;background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(250,253,255,.94));overflow:visible}.moduleCard:before{content:"";position:absolute;left:32px;top:92px;bottom:76px;width:2px;background:linear-gradient(180deg,#bfdbfe,#dbeafe,transparent);border-radius:999px}.moduleCard:after{opacity:.8}.moduleTop{position:relative;z-index:1}.moduleIcon{border-radius:19px}.linkGrid{position:relative;z-index:1;display:flex;flex-direction:column;gap:10px;margin-top:8px;padding-left:18px}.shortcutWrap{position:relative;display:grid;grid-template-columns:1fr 36px;gap:8px;align-items:stretch}.shortcutWrap:before{content:"";position:absolute;left:-18px;top:50%;width:18px;height:2px;background:#bfdbfe;border-radius:999px}.portalLink{min-height:58px;border-radius:999px;padding:11px 12px 11px 17px;display:grid;grid-template-columns:1fr auto;background:#fff;border-color:#dbeafe;box-shadow:0 10px 22px rgba(15,23,42,.045)}.portalLink:hover{transform:translateX(3px);box-shadow:0 14px 30px rgba(37,99,235,.10)}.portalLink b{font-size:14px}.portalLink span{font-size:11.5px}.goBadge{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:30px;padding:0;border-radius:999px;font-style:normal}.editShortcut{width:36px;height:100%;min-height:58px;border-radius:18px;border:1px solid #dbeafe;background:#fff;color:#64748b;cursor:pointer;box-shadow:0 10px 22px rgba(15,23,42,.035)}.editShortcut:hover{background:#eaf4ff;color:#1d4ed8;border-color:#bfdbfe}.addSmall{position:relative;z-index:1}.addSmall .btn{border-radius:999px}.empty{position:relative;z-index:1;margin-left:18px}.frameNotice{display:none!important}@media(max-width:1050px){.portalCanvas:before,.portalCanvas:after{display:none}.moduleCard:before{left:31px}.linkGrid{grid-template-columns:1fr;display:flex}}@media(max-width:650px){.shortcutWrap{grid-template-columns:1fr 34px}.editShortcut{width:34px}.linkGrid{padding-left:14px}.shortcutWrap:before{left:-14px;width:14px}}

</style>
</head>
<body>
<div class="page" id="homeApp">
  <header class="topbar">
    <div class="brand"><div class="brandMark"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg></div><div><h1>Regent Home Portal</h1><p>Simple internal launch page for every team tool.</p></div></div>
    <div class="actions"><button class="btn primary" onclick="openLinkModal()">+ Add Link</button><button class="btn" onclick="openModuleModal()">+ Add Module</button><button class="btn" onclick="openDataModal()">Backup / Import</button></div>
  </header>
  <section class="hero">
    <div class="heroInner"><div><h2>Quick Jump</h2><p class="heroTag">Choose a portal, manage shortcuts, and keep everything in one clean launch board.</p></div><div class="searchWrap"><input id="searchInput" class="input" placeholder="Search name or URL..." oninput="render()"><button class="btn dark" onclick="openLinkModal()">Create</button></div></div>
  </section>
  <main class="portalCanvas" id="moduleGrid"></main>
</div>

<div id="portalView" class="portalView">
  <div class="portalBar"><div class="portalTitle"><b id="frameTitle">Portal</b><span id="frameUrl"></span></div><div class="actions"><button class="btn" onclick="reloadFrame()">Reload</button><button class="btn primary" onclick="goHome()">Home</button></div></div>
  <div class="frameWrap"><iframe id="portalFrame" class="frame" title="Portal content"></iframe></div>
  <button class="floatingHome" onclick="goHome()" title="Back to Home"><svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg></button>
</div>

<div id="linkModal" class="modalBack"><div class="modal"><div class="modalHead"><h3 id="linkModalTitle">Add Link</h3><button class="iconBtn" onclick="closeModals()">✕</button></div><div class="modalBody"><div class="formGrid"><div class="field"><label>Display Name</label><input id="linkName" class="input" placeholder="e.g. Dealer Workbench"></div><div class="field"><label>Module</label><select id="linkModule" class="select"></select></div><div class="field full"><label>URL / HTML file path</label><input id="linkUrl" class="input" placeholder="e.g. dealer-workbench.html or https://example.com"></div><div class="field full"><label>Short note</label><input id="linkNote" class="input" placeholder="Optional description"></div></div></div><div class="modalFoot"><button class="btn" onclick="closeModals()">Cancel</button><button id="deleteLinkBtn" class="btn danger hide" onclick="deleteEditingLink()">Delete</button><button class="btn primary" onclick="saveLink()">Save Link</button></div></div></div>
<div id="moduleModal" class="modalBack"><div class="modal"><div class="modalHead"><h3 id="moduleModalTitle">Add Module</h3><button class="iconBtn" onclick="closeModals()">✕</button></div><div class="modalBody"><div class="formGrid"><div class="field"><label>Module Name</label><input id="moduleName" class="input" placeholder="e.g. Dealer Portal"></div><div class="field"><label>Sub Title</label><input id="moduleNote" class="input" placeholder="Optional"></div></div></div><div class="modalFoot"><button class="btn" onclick="closeModals()">Cancel</button><button id="deleteModuleBtn" class="btn danger hide" onclick="deleteEditingModule()">Delete</button><button class="btn primary" onclick="saveModule()">Save Module</button></div></div></div>
<div id="dataModal" class="modalBack"><div class="modal"><div class="modalHead"><h3>Backup / Import</h3><button class="iconBtn" onclick="closeModals()">✕</button></div><div class="modalBody"><p style="margin:0;color:#607089;line-height:1.5">Copy this JSON as backup, or paste edited JSON and import it.</p><textarea id="dataText" class="textarea"></textarea></div><div class="modalFoot"><button class="btn" onclick="exportData()">Refresh Export</button><button class="btn primary" onclick="importData()">Import JSON</button></div></div></div>

<script>
const STORAGE_KEY="regent_home_portal_v2_grid";
const oldKey="regent_home_portal_v1";
const defaultData={modules:[
  {id:"manager",name:"Manager Portal",note:"Management overview",links:[{id:uid(),name:"Daily Plan",url:"#",note:"Replace with your URL"},{id:uid(),name:"Team Dashboard",url:"#",note:"Replace with your URL"},{id:uid(),name:"Report Centre",url:"#",note:"Replace with your URL"}]},
  {id:"sales",name:"Sales Portal",note:"Sales tools and reports",links:[{id:uid(),name:"Sales Dashboard",url:"#",note:"Replace with your URL"},{id:uid(),name:"Dealer Sales",url:"#",note:"Replace with your URL"},{id:uid(),name:"Forecast",url:"#",note:"Replace with your URL"}]},
  {id:"aftersales",name:"Aftersales",note:"Service and warranty",links:[{id:uid(),name:"Critical Tickets",url:"#",note:"Replace with your URL"},{id:uid(),name:"Warranty",url:"#",note:"Replace with your URL"},{id:uid(),name:"Parts Delivery",url:"#",note:"Replace with your URL"}]},
  {id:"material",name:"Material",note:"Stock and purchasing",links:[{id:uid(),name:"Inventory",url:"#",note:"Replace with your URL"},{id:uid(),name:"Purchase Plan",url:"#",note:"Replace with your URL"},{id:uid(),name:"Supplier List",url:"#",note:"Replace with your URL"}]}
]};
let data=loadData();let editingLink=null;let editingModule=null;const $=id=>document.getElementById(id);
function uid(){return "id"+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}
function loadData(){try{const raw=localStorage.getItem(STORAGE_KEY)||localStorage.getItem(oldKey);if(raw){const parsed=JSON.parse(raw);if(parsed.modules&&Array.isArray(parsed.modules))return parsed}}catch(e){}return structuredClone(defaultData)}
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}
function esc(v){return String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[s]))}
function iconSvg(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M8 9h8M8 13h5"/></svg>`}
function render(){const q=($('searchInput')?.value||'').trim().toLowerCase();const grid=$('moduleGrid');grid.innerHTML='';const modules=data.modules.map(m=>({...m,links:(m.links||[]).filter(l=>!q||[l.name,l.url,l.note,m.name].join(' ').toLowerCase().includes(q))})).filter(m=>!q||m.links.length||m.name.toLowerCase().includes(q));
  modules.forEach(m=>{const card=document.createElement('section');card.className='moduleCard';card.innerHTML=`<div class="moduleTop"><div class="moduleTitle"><div class="moduleIcon">${iconSvg()}</div><div><h3>${esc(m.name)}</h3><p>${esc(m.note||`${(m.links||[]).length} shortcuts`)}</p></div></div><div class="miniActions"><button class="iconBtn" title="Add link" onclick="openLinkModal('${m.id}')">＋</button><button class="iconBtn" title="Edit module" onclick="openModuleModal('${m.id}')">✎</button></div></div><div class="linkGrid">${m.links&&m.links.length?m.links.map(l=>`<div class="shortcutWrap"><a class="portalLink" href="${esc(l.url)}" onclick="openPortal(event,'${m.id}','${l.id}')"><div><b>${esc(l.name)}</b><span>${esc(l.note||l.url)}</span></div><em class="goBadge">›</em></a><button class="editShortcut" title="Edit shortcut" onclick="openLinkModal('${m.id}','${l.id}')">✎</button></div>`).join(''):`<div class="empty">No links yet. Click ＋ to add a shortcut under this module.</div>`}</div><div class="addSmall"><button class="btn primary" onclick="openLinkModal('${m.id}')">+ Add Shortcut</button></div>`;grid.appendChild(card)});
  if(!modules.length){const card=document.createElement('section');card.className='moduleCard';card.innerHTML='<div class="empty">No matching portals found.</div>';grid.appendChild(card)}
}
function normalizeUrl(url){url=(url||'').trim();if(!url)return '#';if(url==='#')return '#';if(url.includes('://')||url.startsWith('/')||url.startsWith('./')||url.startsWith('../')||url.endsWith('.html'))return url;return 'https://'+url}
function findLink(moduleId,linkId){const m=data.modules.find(x=>x.id===moduleId);const l=m?.links?.find(x=>x.id===linkId);return{m,l}}
function openPortal(ev,moduleId,linkId){ev.preventDefault();const {m,l}=findLink(moduleId,linkId);if(!l)return;const url=normalizeUrl(l.url);if(url==='#'){alert('Please edit this shortcut and replace # with a real URL or HTML file path.');return}$('frameTitle').textContent=`${m.name} / ${l.name}`;$('frameUrl').textContent=url;$('portalFrame').src=url;$('portalView').classList.add('active')}
function goHome(){$('portalFrame').src='about:blank';$('portalView').classList.remove('active')}
function reloadFrame(){const f=$('portalFrame');if(f.src)f.src=f.src}
function refreshModuleSelect(selected){$('linkModule').innerHTML=data.modules.map(m=>`<option value="${esc(m.id)}" ${m.id===selected?'selected':''}>${esc(m.name)}</option>`).join('')}
function openLinkModal(moduleId,linkId){editingLink=null;refreshModuleSelect(moduleId||data.modules[0]?.id);$('linkModalTitle').textContent='Add Link';$('linkName').value='';$('linkUrl').value='';$('linkNote').value='';$('deleteLinkBtn').classList.add('hide');if(moduleId&&linkId){const {l}=findLink(moduleId,linkId);if(l){editingLink={moduleId,linkId};$('linkModalTitle').textContent='Edit Link';$('linkModule').value=moduleId;$('linkName').value=l.name||'';$('linkUrl').value=l.url||'';$('linkNote').value=l.note||'';$('deleteLinkBtn').classList.remove('hide')}}$('linkModal').classList.add('active');setTimeout(()=>$('linkName').focus(),40)}
function saveLink(){const moduleId=$('linkModule').value;const name=$('linkName').value.trim();const url=$('linkUrl').value.trim();const note=$('linkNote').value.trim();if(!name||!url){alert('Please enter both display name and URL.');return}if(editingLink){const oldM=data.modules.find(m=>m.id===editingLink.moduleId);const idx=oldM?.links?.findIndex(l=>l.id===editingLink.linkId);if(idx>=0){const item={...oldM.links[idx],name,url,note};oldM.links.splice(idx,1);const newM=data.modules.find(m=>m.id===moduleId);newM.links=newM.links||[];newM.links.push(item)}}else{const m=data.modules.find(x=>x.id===moduleId);m.links=m.links||[];m.links.push({id:uid(),name,url,note})}saveData();closeModals();render()}
function deleteEditingLink(){if(!editingLink)return;const m=data.modules.find(x=>x.id===editingLink.moduleId);m.links=(m.links||[]).filter(l=>l.id!==editingLink.linkId);saveData();closeModals();render()}
function openModuleModal(moduleId){editingModule=null;$('moduleModalTitle').textContent='Add Module';$('moduleName').value='';$('moduleNote').value='';$('deleteModuleBtn').classList.add('hide');if(moduleId){const m=data.modules.find(x=>x.id===moduleId);if(m){editingModule=moduleId;$('moduleModalTitle').textContent='Edit Module';$('moduleName').value=m.name||'';$('moduleNote').value=m.note||'';$('deleteModuleBtn').classList.remove('hide')}}$('moduleModal').classList.add('active');setTimeout(()=>$('moduleName').focus(),40)}
function saveModule(){const name=$('moduleName').value.trim();const note=$('moduleNote').value.trim();if(!name){alert('Please enter module name.');return}if(editingModule){const m=data.modules.find(x=>x.id===editingModule);m.name=name;m.note=note}else{data.modules.push({id:uid(),name,note,links:[]})}saveData();closeModals();render()}
function deleteEditingModule(){if(!editingModule)return;if(!confirm('Delete this module and all shortcuts inside it?'))return;data.modules=data.modules.filter(m=>m.id!==editingModule);saveData();closeModals();render()}
function openDataModal(){$('dataModal').classList.add('active');exportData()}
function exportData(){$('dataText').value=JSON.stringify(data,null,2)}
function importData(){try{const parsed=JSON.parse($('dataText').value);if(!parsed.modules||!Array.isArray(parsed.modules))throw new Error('JSON must contain modules array');data=parsed;saveData();closeModals();render()}catch(e){alert('Import failed: '+e.message)}}
function closeModals(){document.querySelectorAll('.modalBack').forEach(m=>m.classList.remove('active'))}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModals()});document.addEventListener('click',e=>{const a=e.target.closest('.portalLink');if(!a)return;const onclick=a.getAttribute('onclick')||'';});render();
</script>
</body>
</html>
