<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Regent Home Portal</title>
<style>
:root{--bg:#f3f6fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#dbe3ee;--blue:#3b82f6;--blue2:#38bdf8;--shadow:0 12px 34px rgba(15,23,42,.07);--shadow2:0 24px 80px rgba(15,23,42,.18);--radius:24px}
*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;background:radial-gradient(circle at top,#eaf6ff 0,#f3f6fb 42%,#eef3f8 100%);color:var(--ink);font-family:Inter,"Segoe UI",Roboto,Arial,sans-serif;font-size:14px}.page{min-height:100vh;padding:28px clamp(18px,4vw,54px) 44px}.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px}.brand{display:flex;gap:14px;align-items:center}.brandMark{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--blue2),#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 16px 36px rgba(37,99,235,.22)}.brand h1{font-size:30px;line-height:1.05;margin:0;font-weight:700;letter-spacing:-.03em}.brand p{margin:6px 0 0;color:#52627a}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;align-items:center}.btn{height:42px;border:1px solid #dbe7f5;background:#fff;border-radius:14px;padding:0 15px;color:#334155;font-weight:650;cursor:pointer;box-shadow:0 8px 22px rgba(15,23,42,.04)}.btn:hover{background:#f8fbff}.btn.primary{border-color:#bfdbfe;background:#eaf4ff;color:#1d4ed8}.btn.dark{border-color:#111827;background:#111827;color:#fff}.btn.danger{border-color:#fecaca;background:#fff1f2;color:#b91c1c}.editorSwitch{height:42px;display:inline-flex;align-items:center;gap:9px;border:1px solid #dbe7f5;background:#fff;border-radius:999px;padding:4px 12px 4px 5px;cursor:pointer;box-shadow:0 8px 22px rgba(15,23,42,.04);font-weight:700;color:#334155}.switchDot{width:32px;height:32px;border-radius:999px;background:#cbd5e1;display:inline-flex;align-items:center;justify-content:center;color:#fff;transition:.18s}.editorSwitch.active{border-color:#bfdbfe;background:#eaf4ff;color:#1d4ed8}.editorSwitch.active .switchDot{background:linear-gradient(135deg,#38bdf8,#2563eb);transform:translateX(2px)}.editorTools{display:none}.editor .editorTools{display:flex}.hero{position:relative;background:linear-gradient(135deg,#fff 0%,#fbfdff 55%,#edf7ff 100%);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 22px;margin-bottom:22px;overflow:hidden}.hero:before{content:"";position:absolute;right:-78px;top:-88px;width:250px;height:250px;border-radius:999px;background:radial-gradient(circle,rgba(56,189,248,.25),rgba(59,130,246,0));pointer-events:none}.heroInner{position:relative;display:grid;grid-template-columns:1fr minmax(280px,520px);gap:16px;align-items:center}.hero h2{font-size:22px;margin:0;font-weight:650;letter-spacing:-.02em}.searchWrap{display:flex;gap:10px}.input,.select{height:42px;border:1px solid var(--line);border-radius:13px;background:#fff;padding:0 13px;color:#0f172a;outline:0;width:100%}.input:focus,.select:focus,.textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(147,197,253,.28)}
.portalCanvas{position:relative;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:minmax(310px,1fr) minmax(310px,1fr);gap:26px;min-height:660px}.portalCanvas:before,.portalCanvas:after{content:"";position:absolute;z-index:0;opacity:.75}.portalCanvas:before{left:50%;top:24px;bottom:24px;width:2px;background:linear-gradient(180deg,transparent,#c9d7e8,transparent)}.portalCanvas:after{top:50%;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,#c9d7e8,transparent)}.moduleCard{position:relative;z-index:1;background:linear-gradient(180deg,rgba(255,255,255,.97),rgba(250,253,255,.95));border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:24px;display:flex;flex-direction:column;overflow:visible;transition:.18s}.moduleCard:before{content:"";position:absolute;left:32px;top:94px;bottom:76px;width:2px;background:linear-gradient(180deg,#bfdbfe,#dbeafe,transparent);border-radius:999px}.moduleCard:after{content:"";position:absolute;width:160px;height:160px;right:-70px;top:-80px;border-radius:999px;background:radial-gradient(circle,rgba(59,130,246,.13),rgba(59,130,246,0));pointer-events:none}.moduleCard:nth-child(2n):after{left:-80px;right:auto;top:auto;bottom:-88px}.editor .moduleCard{cursor:grab}.moduleCard.dragging{opacity:.46;transform:scale(.985);box-shadow:0 10px 24px rgba(15,23,42,.05)}.moduleCard.dragOver{outline:3px solid rgba(59,130,246,.22);outline-offset:4px}.moduleTop{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.moduleTitle{display:flex;align-items:center;gap:13px;min-width:0}.moduleIcon{width:48px;height:48px;border-radius:19px;background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 15px 30px rgba(37,99,235,.18);flex:0 0 auto}.moduleIcon svg{width:23px;height:23px;stroke-width:1.8}.moduleTitle h3{margin:0;font-size:24px;font-weight:700;letter-spacing:-.025em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.moduleTitle p{margin:4px 0 0;color:#64748b;font-size:12px}.miniActions{display:none;gap:8px}.editor .miniActions{display:flex}.dragHint{display:none;color:#94a3b8;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}.editor .dragHint{display:block}.iconBtn{width:35px;height:35px;border:1px solid #e2e8f0;background:#fff;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:#64748b}.iconBtn:hover{background:#f8fbff;color:#0f172a}.linkGrid{position:relative;z-index:1;display:flex;flex-direction:column;gap:10px;margin-top:8px;padding-left:18px}.shortcutWrap{position:relative;display:grid;grid-template-columns:1fr;gap:8px;align-items:stretch}.editor .shortcutWrap{grid-template-columns:1fr 36px}.shortcutWrap:before{content:"";position:absolute;left:-18px;top:50%;width:18px;height:2px;background:#c7dcf7}.portalLink{min-height:60px;text-decoration:none;color:#0f172a;background:rgba(255,255,255,.92);border:1px solid #dbeafe;border-radius:999px;padding:12px 16px 12px 18px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;transition:.16s ease;box-shadow:0 8px 20px rgba(15,23,42,.035)}.portalLink:hover{transform:translateY(-1px);background:#f7fbff;border-color:#bfdbfe;box-shadow:0 12px 28px rgba(15,23,42,.07)}.portalLink b{display:block;font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.portalLink span{display:block;margin-top:4px;color:#64748b;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.goBadge{font-style:normal;font-size:18px;color:#1d4ed8}.editShortcut{display:none;width:36px;height:100%;border:1px solid #dbeafe;background:#fff;border-radius:18px;color:#64748b;cursor:pointer}.editor .editShortcut{display:block}.editShortcut:hover{color:#1d4ed8;background:#f8fbff}.empty{border:1px dashed #cbd5e1;border-radius:18px;background:rgba(248,251,255,.75);padding:17px;color:#64748b;line-height:1.5}.addSmall{display:none;margin-top:auto;padding-top:16px}.editor .addSmall{display:block}.portalView{display:none;position:fixed;inset:0;z-index:40;background:var(--bg)}.portalView.active{display:block}.portalBar{height:62px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 10px 28px rgba(15,23,42,.05);padding:0 18px 0 22px}.portalTitle{min-width:0}.portalTitle b{display:block;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.portalTitle span{display:block;color:#64748b;font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.frameWrap{height:calc(100vh - 62px);position:relative}.frame{width:100%;height:100%;border:0;background:#fff}.frameNotice{display:none;position:absolute;left:24px;top:24px;right:24px;background:#fff7ed;border:1px solid #fdba74;color:#9a3412;border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);line-height:1.5}.floatingHome{position:fixed;right:22px;bottom:22px;z-index:60;width:58px;height:58px;border:0;border-radius:20px;background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff;box-shadow:0 18px 45px rgba(37,99,235,.30);display:none;align-items:center;justify-content:center;cursor:pointer}.portalView.active .floatingHome{display:flex}.modalBack{position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;align-items:center;justify-content:center;z-index:80;padding:20px}.modalBack.active{display:flex}.modal{width:min(720px,100%);background:#fff;border-radius:20px;box-shadow:var(--shadow2);border:1px solid #e2e8f0;overflow:hidden}.modalHead{padding:20px 22px;border-bottom:1px solid #edf2f8;display:flex;justify-content:space-between;align-items:center}.modalHead h3{margin:0;font-size:20px;font-weight:700}.modalBody{padding:20px 22px;display:grid;gap:14px}.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:grid;gap:7px}.field label{font-weight:700;color:#334155;font-size:12px}.field.full{grid-column:1/-1}.modalFoot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px 22px}.textarea{min-height:130px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px 13px;color:#0f172a;outline:0;resize:vertical;font-family:inherit}.hide{display:none!important}@media(max-width:1050px){.portalCanvas{grid-template-columns:1fr;grid-template-rows:auto;min-height:0}.portalCanvas:before,.portalCanvas:after{display:none}.heroInner{grid-template-columns:1fr}.searchWrap{min-width:0}}@media(max-width:650px){.page{padding:20px 16px 34px}.topbar{display:block}.actions{justify-content:flex-start;margin-top:14px}.brand h1{font-size:26px}.moduleTitle h3{font-size:20px}.formGrid{grid-template-columns:1fr}.portalBar{height:auto;min-height:68px;align-items:flex-start;padding:14px}.frameWrap{height:calc(100vh - 76px)}}
</style>
<style>
.syncStatus{min-height:30px;display:inline-flex;align-items:center;border:1px solid #e2e8f0;border-radius:999px;background:#fff;padding:0 11px;color:#64748b;font-size:12px;font-weight:700;white-space:nowrap;box-shadow:0 8px 22px rgba(15,23,42,.04)}
.syncStatus.ok{border-color:#bbf7d0;background:#f0fdf4;color:#15803d}
.syncStatus.warn{border-color:#fed7aa;background:#fff7ed;color:#c2410c}
.syncStatus.bad{border-color:#fecaca;background:#fff1f2;color:#b91c1c}
</style>
</head>
<body>
<div class="page">
  <header class="topbar">
    <div class="brand"><div class="brandMark"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg></div><div><h1>Regent Home Portal</h1><p>Simple internal launch page for every team tool.</p></div></div>
    <div class="actions"><button id="editorSwitch" class="editorSwitch" onclick="toggleEditor()"><span class="switchDot">✎</span><span id="editorText">Editor Off</span></button><span id="syncStatus" class="syncStatus warn">Local only</span><div class="editorTools"><button class="btn primary" onclick="openLinkModal()">+ Add Link</button><button class="btn" onclick="openModuleModal()">+ Add Module</button><button class="btn" onclick="syncNow()">Sync Now</button><button class="btn" onclick="openDataModal()">Backup / Import</button></div></div>
  </header>
  <section class="hero"><div class="heroInner"><h2>Quick Jump</h2><div class="searchWrap"><input id="searchInput" class="input" placeholder="Search name or URL..." oninput="render()"><button class="btn dark editorTools" onclick="openLinkModal()">Create</button></div></div></section>
  <main class="portalCanvas" id="moduleGrid"></main>
</div>

<div id="portalView" class="portalView">
  <div class="portalBar"><div class="portalTitle"><b id="frameTitle">Portal</b><span id="frameUrl"></span></div><div class="actions"><button class="btn" onclick="reloadFrame()">Reload</button><button class="btn primary" onclick="goHome()">Home</button></div></div>
  <div class="frameWrap"><iframe id="portalFrame" class="frame" title="Portal content"></iframe></div>
  <button class="floatingHome" onclick="goHome()" title="Back to Home"><svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg></button>
</div>

<div id="linkModal" class="modalBack"><div class="modal"><div class="modalHead"><h3 id="linkModalTitle">Add Link</h3><button class="iconBtn" onclick="closeModals()">✕</button></div><div class="modalBody"><div class="formGrid"><div class="field"><label>Display Name</label><input id="linkName" class="input" placeholder="e.g. Dealer Workbench"></div><div class="field"><label>Module</label><select id="linkModule" class="select"></select></div><div class="field full"><label>URL / HTML file path</label><input id="linkUrl" class="input" placeholder="e.g. dealer-workbench.html or https://example.com"></div><div class="field full"><label>Short note</label><input id="linkNote" class="input" placeholder="Optional description"></div></div></div><div class="modalFoot"><button class="btn" onclick="closeModals()">Cancel</button><button id="deleteLinkBtn" class="btn danger hide" onclick="deleteEditingLink()">Delete</button><button class="btn primary" onclick="saveLink()">Save Link</button></div></div></div>
<div id="moduleModal" class="modalBack"><div class="modal"><div class="modalHead"><h3 id="moduleModalTitle">Add Module</h3><button class="iconBtn" onclick="closeModals()">✕</button></div><div class="modalBody"><div class="formGrid"><div class="field"><label>Module Name</label><input id="moduleName" class="input" placeholder="e.g. Dealer Portal"></div><div class="field"><label>Sub Title</label><input id="moduleNote" class="input" placeholder="Optional"></div></div></div><div class="modalFoot"><button class="btn" onclick="closeModals()">Cancel</button><button id="deleteModuleBtn" class="btn danger hide" onclick="deleteEditingModule()">Delete</button><button class="btn primary" onclick="saveModule()">Save Module</button></div></div></div>
<div id="dataModal" class="modalBack"><div class="modal"><div class="modalHead"><h3>Backup / Import</h3><button class="iconBtn" onclick="closeModals()">✕</button></div><div class="modalBody"><div class="formGrid"><div class="field"><label>Cloud API URL</label><input id="syncEndpoint" class="input" placeholder="https://your-worker.workers.dev"></div><div class="field"><label>Editor PIN</label><input id="syncToken" class="input" type="password" autocomplete="current-password" placeholder="Required for cloud save"></div></div><p style="margin:0;color:#607089;line-height:1.5">Copy this JSON as backup, or paste edited JSON and import it.</p><textarea id="dataText" class="textarea"></textarea></div><div class="modalFoot"><button class="btn" onclick="saveCloudSettings()">Save Cloud Settings</button><button class="btn" onclick="pullCloudFromModal()">Pull Cloud</button><button class="btn" onclick="exportData()">Refresh Export</button><button class="btn primary" onclick="importData()">Import JSON</button></div></div></div>

<script>
const STORAGE_KEY="regent_home_portal_v2_grid";
const EDITOR_KEY="regent_home_portal_editor_mode";
const SYNC_ENDPOINT_KEY="regent_home_portal_sync_endpoint";
const SYNC_TOKEN_KEY="regent_home_portal_sync_token";
const oldKey="regent_home_portal_v1";
const defaultData={modules:[
  {id:"after-sales-started",name:"After-Sales (Started)",note:"After-sales operations",links:[]},
  {id:"dealerships",name:"Dealerships",note:"Dealer network",links:[]},
  {id:"spare-parts",name:"Spare Parts",note:"Parts availability",links:[]},
  {id:"inventory",name:"Inventory",note:"Stock control",links:[]},
  {id:"service-centre",name:"Service Centre",note:"Service operations",links:[]}
]};

let data=loadLocalData();
let editorMode=localStorage.getItem(EDITOR_KEY)==="1";
let syncEndpoint=(window.PORTAL_SYNC_URL||localStorage.getItem(SYNC_ENDPOINT_KEY)||"").trim();
let editorToken=localStorage.getItem(SYNC_TOKEN_KEY)||"";
let editingLink=null;
let editingModule=null;
let draggedModuleId=null;
let saveTimer=null;
const $=id=>document.getElementById(id);

function uid(){return "id"+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}
function loadLocalData(){try{const raw=localStorage.getItem(STORAGE_KEY)||localStorage.getItem(oldKey);if(raw){const parsed=JSON.parse(raw);if(isPortalData(parsed))return migrateModuleNames(parsed)}}catch(e){}return structuredClone(defaultData)}
function saveData(options={remote:true}){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));if(options.remote)queueRemoteSave()}
function isPortalData(value){return !!value&&Array.isArray(value.modules)}
function migrateModuleNames(value){const oldNames=["Manager Portal","Sales Portal","Aftersales","Material"];if(!value.modules.some(m=>oldNames.includes(m.name)))return value;const migrated=structuredClone(value);defaultData.modules.forEach((target,index)=>{const module=migrated.modules[index];if(module){module.id=target.id;module.name=target.name;module.note=target.note;module.links=Array.isArray(module.links)?module.links:[]}else{migrated.modules.push(structuredClone(target))}});return migrated}
function esc(v){return String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[s]))}
function iconSvg(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M8 9h8M8 13h5"/></svg>`}
function setSyncStatus(text,type="warn"){const el=$('syncStatus');if(!el)return;el.textContent=text;el.className=`syncStatus ${type}`;el.title=syncEndpoint||"No cloud API configured"}
function refreshSyncStatus(){setSyncStatus(syncEndpoint?"Cloud ready":"Local only",syncEndpoint?"ok":"warn")}
function authHeaders(){const headers={"Content-Type":"application/json"};if(editorToken)headers["X-Editor-Token"]=editorToken;return headers}
function ensureEditorToken(){if(!syncEndpoint||editorToken)return true;const token=prompt("Editor PIN");if(token===null)return false;editorToken=token.trim();if(editorToken)localStorage.setItem(SYNC_TOKEN_KEY,editorToken);return !!editorToken}
function queueRemoteSave(){if(!syncEndpoint){setSyncStatus("Local only","warn");return}clearTimeout(saveTimer);setSyncStatus("Saving...","warn");saveTimer=setTimeout(()=>pushRemoteData(false),450)}
async function pushRemoteData(showAlert=true){if(!syncEndpoint){openDataModal();return false}if(!ensureEditorToken())return false;try{setSyncStatus("Saving...","warn");const res=await fetch(syncEndpoint,{method:"PUT",headers:authHeaders(),body:JSON.stringify(data)});if(res.status===401)throw new Error("Wrong or missing Editor PIN");if(!res.ok)throw new Error(`Cloud save failed (${res.status})`);setSyncStatus("Cloud saved","ok");if(showAlert)alert("Cloud save complete.");return true}catch(e){setSyncStatus("Sync error","bad");if(showAlert)alert(e.message);return false}}
async function pullRemoteData(showAlert=false){if(!syncEndpoint){if(showAlert)openDataModal();refreshSyncStatus();return false}try{setSyncStatus("Loading...","warn");const res=await fetch(syncEndpoint,{method:"GET",cache:"no-store"});if(res.status===404){setSyncStatus("No cloud data","warn");if(showAlert)alert("No cloud data has been saved yet.");return false}if(!res.ok)throw new Error(`Cloud load failed (${res.status})`);const remote=await res.json();if(!isPortalData(remote))throw new Error("Cloud data is not a portal JSON payload");data=migrateModuleNames(remote);saveData({remote:false});render();setSyncStatus("Cloud loaded","ok");if(showAlert)alert("Cloud data loaded.");return true}catch(e){setSyncStatus("Sync error","bad");if(showAlert)alert(e.message);return false}}
function persistCloudSettingsFromForm(){syncEndpoint=($('syncEndpoint')?.value||"").trim();editorToken=($('syncToken')?.value||"").trim();if(syncEndpoint)localStorage.setItem(SYNC_ENDPOINT_KEY,syncEndpoint);else localStorage.removeItem(SYNC_ENDPOINT_KEY);if(editorToken)localStorage.setItem(SYNC_TOKEN_KEY,editorToken);else localStorage.removeItem(SYNC_TOKEN_KEY);refreshSyncStatus()}
function saveCloudSettings(){persistCloudSettingsFromForm();alert(syncEndpoint?"Cloud settings saved.":"Cloud sync disabled.")}
function pullCloudFromModal(){persistCloudSettingsFromForm();return pullRemoteData(true)}
function syncNow(){return pushRemoteData(true)}
function setEditorMode(on){editorMode=!!on;localStorage.setItem(EDITOR_KEY,editorMode?"1":"0");document.body.classList.toggle('editor',editorMode);$('editorSwitch').classList.toggle('active',editorMode);$('editorText').textContent=editorMode?'Editor On':'Editor Off';render()}
function toggleEditor(){const next=!editorMode;if(next&&!ensureEditorToken())return;setEditorMode(next)}
function render(){const q=($('searchInput')?.value||'').trim().toLowerCase();const grid=$('moduleGrid');grid.innerHTML='';const modules=data.modules.map(m=>({...m,links:(m.links||[]).filter(l=>!q||[l.name,l.url,l.note,m.name].join(' ').toLowerCase().includes(q))})).filter(m=>!q||m.links.length||m.name.toLowerCase().includes(q));
  modules.forEach(m=>{const card=document.createElement('section');card.className='moduleCard';card.dataset.moduleId=m.id;card.draggable=editorMode&&!q;card.innerHTML=`<div class="dragHint">Drag module to reorder</div><div class="moduleTop"><div class="moduleTitle"><div class="moduleIcon">${iconSvg()}</div><div><h3>${esc(m.name)}</h3><p>${esc(m.note||`${(m.links||[]).length} shortcuts`)}</p></div></div><div class="miniActions"><button class="iconBtn" title="Add link" onclick="openLinkModal('${m.id}')">+</button><button class="iconBtn" title="Edit module" onclick="openModuleModal('${m.id}')">&#9998;</button></div></div><div class="linkGrid">${m.links&&m.links.length?m.links.map(l=>`<div class="shortcutWrap"><a class="portalLink" href="${esc(l.url)}" onclick="openPortal(event,'${m.id}','${l.id}')"><div><b>${esc(l.name)}</b><span>${esc(l.note||l.url)}</span></div><em class="goBadge">&rsaquo;</em></a><button class="editShortcut" title="Edit shortcut" onclick="openLinkModal('${m.id}','${l.id}')">&#9998;</button></div>`).join(''):`<div class="empty">${editorMode?'No links yet. Click + to add a shortcut under this module.':'No links yet.'}</div>`}</div><div class="addSmall"><button class="btn primary" onclick="openLinkModal('${m.id}')">+ Add Shortcut</button></div>`;bindDrag(card);grid.appendChild(card)});
  if(!modules.length){const card=document.createElement('section');card.className='moduleCard';card.innerHTML='<div class="empty">No matching portals found.</div>';grid.appendChild(card)}
}
function bindDrag(card){card.addEventListener('dragstart',e=>{if(!editorMode||$('searchInput').value.trim()){e.preventDefault();return}draggedModuleId=card.dataset.moduleId;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',draggedModuleId)});card.addEventListener('dragend',()=>{draggedModuleId=null;document.querySelectorAll('.moduleCard').forEach(c=>c.classList.remove('dragging','dragOver'))});card.addEventListener('dragover',e=>{if(!editorMode||!draggedModuleId||draggedModuleId===card.dataset.moduleId)return;e.preventDefault();card.classList.add('dragOver')});card.addEventListener('dragleave',()=>card.classList.remove('dragOver'));card.addEventListener('drop',e=>{if(!editorMode||!draggedModuleId)return;e.preventDefault();const targetId=card.dataset.moduleId;card.classList.remove('dragOver');if(!targetId||targetId===draggedModuleId)return;const from=data.modules.findIndex(m=>m.id===draggedModuleId);const to=data.modules.findIndex(m=>m.id===targetId);if(from<0||to<0)return;const [item]=data.modules.splice(from,1);data.modules.splice(to,0,item);saveData();render()})}
function normalizeUrl(url){url=(url||'').trim();if(!url)return '#';if(url==='#')return '#';if(url.includes('://')||url.startsWith('/')||url.startsWith('./')||url.startsWith('../')||url.endsWith('.html'))return url;return 'https://'+url}
function findLink(moduleId,linkId){const m=data.modules.find(x=>x.id===moduleId);const l=m?.links?.find(x=>x.id===linkId);return{m,l}}
function openPortal(ev,moduleId,linkId){ev.preventDefault();const {m,l}=findLink(moduleId,linkId);if(!l)return;const url=normalizeUrl(l.url);if(url==='#'){if(editorMode){alert('Please edit this shortcut and replace # with a real URL or HTML file path.')}return}$('frameTitle').textContent=`${m.name} / ${l.name}`;$('frameUrl').textContent=url;$('portalFrame').src=url;$('portalView').classList.add('active')}
function goHome(){$('portalFrame').src='about:blank';$('portalView').classList.remove('active')}
function reloadFrame(){const f=$('portalFrame');if(f.src)f.src=f.src}
function requireEditor(){if(!editorMode){return false}return true}
function refreshModuleSelect(selected){$('linkModule').innerHTML=data.modules.map(m=>`<option value="${esc(m.id)}" ${m.id===selected?'selected':''}>${esc(m.name)}</option>`).join('')}
function openLinkModal(moduleId,linkId){if(!requireEditor())return;editingLink=null;refreshModuleSelect(moduleId||data.modules[0]?.id);$('linkModalTitle').textContent='Add Link';$('linkName').value='';$('linkUrl').value='';$('linkNote').value='';$('deleteLinkBtn').classList.add('hide');if(moduleId&&linkId){const {l}=findLink(moduleId,linkId);if(l){editingLink={moduleId,linkId};$('linkModalTitle').textContent='Edit Link';$('linkModule').value=moduleId;$('linkName').value=l.name||'';$('linkUrl').value=l.url||'';$('linkNote').value=l.note||'';$('deleteLinkBtn').classList.remove('hide')}}$('linkModal').classList.add('active');setTimeout(()=>$('linkName').focus(),40)}
function saveLink(){if(!requireEditor())return;const moduleId=$('linkModule').value;const name=$('linkName').value.trim();const url=$('linkUrl').value.trim();const note=$('linkNote').value.trim();if(!name||!url){alert('Please enter both display name and URL.');return}if(editingLink){const oldM=data.modules.find(m=>m.id===editingLink.moduleId);const idx=oldM?.links?.findIndex(l=>l.id===editingLink.linkId);if(idx>=0){const item={...oldM.links[idx],name,url,note};oldM.links.splice(idx,1);const newM=data.modules.find(m=>m.id===moduleId);newM.links=newM.links||[];newM.links.push(item)}}else{const m=data.modules.find(x=>x.id===moduleId);m.links=m.links||[];m.links.push({id:uid(),name,url,note})}saveData();closeModals();render()}
function deleteEditingLink(){if(!requireEditor()||!editingLink)return;const m=data.modules.find(x=>x.id===editingLink.moduleId);m.links=(m.links||[]).filter(l=>l.id!==editingLink.linkId);saveData();closeModals();render()}
function openModuleModal(moduleId){if(!requireEditor())return;editingModule=null;$('moduleModalTitle').textContent='Add Module';$('moduleName').value='';$('moduleNote').value='';$('deleteModuleBtn').classList.add('hide');if(moduleId){const m=data.modules.find(x=>x.id===moduleId);if(m){editingModule=moduleId;$('moduleModalTitle').textContent='Edit Module';$('moduleName').value=m.name||'';$('moduleNote').value=m.note||'';$('deleteModuleBtn').classList.remove('hide')}}$('moduleModal').classList.add('active');setTimeout(()=>$('moduleName').focus(),40)}
function saveModule(){if(!requireEditor())return;const name=$('moduleName').value.trim();const note=$('moduleNote').value.trim();if(!name){alert('Please enter module name.');return}if(editingModule){const m=data.modules.find(x=>x.id===editingModule);m.name=name;m.note=note}else{data.modules.push({id:uid(),name,note,links:[]})}saveData();closeModals();render()}
function deleteEditingModule(){if(!requireEditor()||!editingModule)return;if(!confirm('Delete this module and all shortcuts inside it?'))return;data.modules=data.modules.filter(m=>m.id!==editingModule);saveData();closeModals();render()}
function openDataModal(){if(!requireEditor())return;$('syncEndpoint').value=syncEndpoint;$('syncToken').value=editorToken;$('dataModal').classList.add('active');exportData()}
function exportData(){$('dataText').value=JSON.stringify(data,null,2)}
function importData(){if(!requireEditor())return;try{const parsed=JSON.parse($('dataText').value);if(!isPortalData(parsed))throw new Error('JSON must contain modules array');data=parsed;saveData();closeModals();render()}catch(e){alert('Import failed: '+e.message)}}
function closeModals(){document.querySelectorAll('.modalBack').forEach(m=>m.classList.remove('active'))}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModals()});
refreshSyncStatus();
setEditorMode(editorMode);
pullRemoteData(false);
</script>
</body>
